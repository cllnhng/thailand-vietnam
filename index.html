  bangkok:[
    {day:1,theme:"Elephants & Markets",activities:[
      {name:"Bangkok Elephant Park",note:"picked up at 7am from the hotel, you get to play, bathe and feed elephants and thai lunch is included. such an amazing day",nearby:[]},
      {name:"Chatuchak Weekend Market + JODD FAIRS",note:"massive market with clothes, souvenirs, vintage finds and decor and then night market vibes at jodd fairs after. so much to do",nearby:[
        {name:"Auntie Tim's Pork Leg Rice",type:"food",distance:"2 min walk from entrance",note:"braised pork leg for like 70 baht and grandma runs the whole stall herself. opens 7:30am ⭐ 4.9",maps:"https://maps.google.com/?q=Auntie+Tim+Pork+Leg+Rice+Chatuchak"},
        {name:"Feel Good Kitchen",type:"food",distance:"3 min walk inside Gate 24",note:"the dry khao soi and pad kaphrao moo sap are ridiculously good and so fresh ⭐ 4.9",maps:"https://maps.google.com/?q=Feel+Good+Kitchen+Chatuchak"},
        {name:"Beef Noodles Stall (Section 4)",type:"food",distance:"5 min walk inside the market",note:"5.0 stars from 267 people which is insane. rich broth and slow cooked beef for 80 baht. sat and sun only ⭐ 5.0",maps:"https://maps.google.com/?q=Beef+Noodles+Chatuchak+Market"},
        {name:"Toh-Plue Restaurant",type:"food",distance:"5 min walk from main gate",note:"artsy restaurant with live music and they bring your food with a tiny flag of your country which is so cute!! ac inside too ⭐ 4.2",maps:"https://maps.google.com/?q=Toh-Plue+Chatuchak"},
        {name:"Or Tor Kor Market",type:"market",distance:"5 min walk across from Chatuchak",note:"thailand's most premium fresh market right across the street. beautiful produce, mango sticky rice, coconut water. completely different vibe. opens 6am ⭐ 4.4",maps:"https://maps.google.com/?q=Or+Tor+Kor+Market+Bangkok"},
        {name:"Cheap Shots Bar",type:"nightlife",distance:"inside Chatuchak market",note:"cocktails and thai food right inside the market which is so convenient for a saturday afternoon drink. opens 9am ⭐ 4.4",maps:"https://maps.google.com/?q=Cheap+Shots+Chatuchak"},
        {name:"Route66 Club",type:"nightlife",distance:"near JODD FAIRS, Rama 9",note:"3 rooms with 3 different genres, edm, hip hop and chill. 300 baht entry plus a free drink and the local crowd is so fun ⭐ 4.0",maps:"https://maps.google.com/?q=Route66+Rama9+Bangkok"},
        {name:"MUIN Bangkok Club",type:"nightlife",distance:"near JODD FAIRS on Soi 63",note:"korean style club with food trucks outside and the standing area is free. great djs and the vibe is immaculate. 9pm to 3:45am ⭐ 4.6",maps:"https://maps.google.com/?q=MUIN+Bangkok+Club"},
      ]},
      {name:"Sukhumvit Bars & Clubs",note:"saturday night out!! walk lively sukhumvit and dress to impress because people actually dress up here",nearby:[
        {name:"Sugar Club Bangkok",type:"nightlife",distance:"10 min walk on Soi 11",note:"hip hop and rnb vibes and super popular with the international crowd. 10pm to 4am ⭐ 4.0",maps:"https://maps.google.com/?q=Sugar+Club+Bangkok+Sukhumvit+11"},
        {name:"Lucy Club Bangkok",type:"nightlife",distance:"15 min walk, Nana area",note:"rave vibes and some of the most incredible djs in bangkok. the most loved club on this side of the city. 10pm to 4am ⭐ 4.7",maps:"https://maps.google.com/?q=Lucy+Club+Bangkok+Nana"},
        {name:"Sing Sing Theater",type:"nightlife",distance:"15 min walk on Soi 45",note:"shanghai speakeasy vibes with amazing djs and moody dim lighting and entry is free!! ⭐ 4.3",maps:"https://maps.google.com/?q=Sing+Sing+Theater+Bangkok"},
      ]},
    ]},
    {day:2,theme:"Muay Thai & Chinatown",activities:[
      {name:"Muay Thai Class (11AM)",note:"lunch is included which is so nice! book a massage somewhere after because you will need it",nearby:[
        {name:"Elite Bistro Bangkok",type:"food",distance:"in same building as Elite Fight Club",note:"pool in the center, healthy food, regulars go straight from training. opens 9am ⭐ 4.8",maps:"https://maps.google.com/?q=Elite+Bistro+Bangkok"},
        {name:"Eden The Ultimate Spa",type:"spa",distance:"10 min walk on Soi 11",note:"5.0 stars from over 1700 people like that is insane. legitimately the best massage in bangkok, non negotiable. opens 10am ⭐ 5.0",maps:"https://maps.google.com/?q=Eden+Spa+Sukhumvit+11+Bangkok"},
      ]},
      {name:"Benchakitti Park",note:"wander around the park, have a little picnic or go back to chatuchak because it's still open today",nearby:[
        {name:"D'ARK EmQuartier",type:"food",distance:"5 min walk at EmQuartier Mall",note:"specialty coffee and brunch. acai bowl, mushroom avocado toast, flat whites. opens 8am ⭐ 4.4",maps:"https://maps.google.com/?q=DARK+EmQuartier+Bangkok"},
        {name:"Sparq Spaces Photo Studio",type:"photo",distance:"10 min walk on Soi 2",note:"so many backdrops and costumes and the lighting makes everyone look amazing. perfect for a group photoshoot! opens 9am ⭐ 5.0",maps:"https://maps.google.com/?q=Sparq+Spaces+Bangkok+Sukhumvit"},
      ]},
      {name:"Yaowarat Road Chinatown (Night)",note:"it comes alive at night with all the neon signs and street stalls literally everywhere. go after dark",nearby:[
        {name:"GSB Street Food",type:"food",distance:"2 min walk on Yaowarat Road",note:"chinese style noodle soups and crab dishes. flavor packed. cheap and local ⭐ 4.7",maps:"https://maps.google.com/?q=GSB+Street+Food+Yaowarat+Bangkok"},
        {name:"Original Thai Street Food Since 1940",type:"food",distance:"3 min walk from Yaowarat strip",note:"open 24 hours. perfect for a late night feed. full menu of local classics ⭐ 4.5",maps:"https://maps.google.com/?q=Original+Thai+Street+Food+1940+Yaowarat"},
        {name:"Arteasia Desserts & Cafe",type:"food",distance:"5 min walk on Song Wat Rd",note:"lemon lavender tart, mango sticky rice. beautiful space in a chinatown alley. tue to sun ⭐ 4.9",maps:"https://maps.google.com/?q=Arteasia+Desserts+Cafe+Bangkok"},
        {name:"Lhong Tou Cafe",type:"viral",distance:"2 min walk at 538 Yaowarat Road",note:"went massively viral on tiktok for the bunk bed seating which sounds weird but looks so cool. the dim sum in bamboo steamers is so pretty. get there before 11am ⭐ 4.2",maps:"https://maps.google.com/?q=Lhong+Tou+Cafe+Yaowarat+Bangkok"},
        {name:"Chinatown Night Market",type:"souvenir",distance:"on Yaowarat Road",note:"neon lit stalls with clothes, toys, electronics, accessories. bargain heavily. opens 4pm to 2am ⭐ 4.5",maps:"https://maps.google.com/?q=Chinatown+Night+Market+Bangkok"},
      ]},
    ]},
    {day:3,theme:"Grand Palace & ICONSIAM",activities:[
      {name:"The Grand Palace + Temples",note:"ease into the day with a stroll through, take a little boat to the nearby temples while you're there",nearby:[
        {name:"MoonaLisa Cafe",type:"food",distance:"2 min walk from Grand Palace entrance",note:"tiny local cafe right outside the palace entrance. the lychee americano and chocolate lava cake are so good. opens 7:30am ⭐ 4.9",maps:"https://maps.google.com/?q=MoonaLisa+Cafe+Grand+Palace+Bangkok"},
        {name:"Kin & Koff Cafe",type:"food",distance:"5 min walk near Wat Pho",note:"right between the palace and wat pho, perfect rest stop. mango sticky rice and basil beef. opens 8am ⭐ 4.8",maps:"https://maps.google.com/?q=Kin+Koff+Cafe+Tha+Tien+Bangkok"},
        {name:"PAULETTE BKK",type:"food",distance:"5 min walk near Wat Ratchabophit",note:"french thai cafe with actual temple views from inside. get a croissant and coffee before the palace opens. opens 7:30am ⭐ 4.6",maps:"https://maps.google.com/?q=Paulette+BKK+Bangkok"},
        {name:"RONGROS Restaurant",type:"food",distance:"10 min boat ride across the river",note:"rooftop restaurant with a direct view of wat arun across the river. book the riverside seat for sunset, it's magical ⭐ 4.7",maps:"https://maps.google.com/?q=RONGROS+Bangkok+Riverside"},
        {name:"Grand Palace courtyard",type:"photo",distance:"you're already there!",note:"one of the most stunning photo locations in all of southeast asia. best morning light 8 to 10am before crowds ⭐ 4.8",maps:"https://maps.google.com/?q=Grand+Palace+Bangkok"},
        {name:"Jay Fai Michelin Street Food",type:"viral",distance:"15 min walk or short taxi",note:"since you're already over here!! 81 year old grandma in goggles cooking the most iconic crab omelette over real charcoal flames. went global on netflix and tiktok. wed to sun 9am to 7:30pm",maps:"https://maps.google.com/?q=Jay+Fai+Raan+Bangkok"},
      ]},
      {name:"ICONSIAM Mall",note:"the perfect ac break! basement food court, fountain shows, floating market vibes inside. genuinely so fun",nearby:[
        {name:"GINGER FARM Kitchen",type:"food",distance:"inside ICONSIAM",note:"northern thai farm to table inside iconsiam and the khao soi and mango sticky rice with coconut ice cream are so good ⭐ 4.6",maps:"https://maps.google.com/?q=Ginger+Farm+Kitchen+ICONSIAM"},
        {name:"Bread Street Kitchen by Gordon Ramsay",type:"food",distance:"Floor 3, ICONSIAM",note:"the splurge option. beef wellington and sticky toffee pudding and the whole thing feels so celebratory ⭐ 4.8",maps:"https://maps.google.com/?q=Bread+Street+Kitchen+ICONSIAM"},
        {name:"ICONSIAM floating market",type:"photo",distance:"basement of ICONSIAM",note:"the indoor floating market in the basement is genuinely so beautiful to photograph and the riverside promenade at golden hour is stunning ⭐ 4.7",maps:"https://maps.google.com/?q=ICONSIAM+Bangkok"},
        {name:"King Power Mahanakhon Skywalk",type:"viral",distance:"15 min drive from ICONSIAM",note:"glass floor 78 floors up and 360 views of all of bangkok. literally on everyones tiktok for a reason. go at sunset around 4pm. about 880 baht ⭐ 4.7",maps:"https://maps.google.com/?q=King+Power+Mahanakhon+Bangkok"},
        {name:"After You Dessert Cafe (ICONSIAM branch)",type:"viral",distance:"inside ICONSIAM, B1 floor",note:"there's an after you right inside iconsiam!! get the baby thai tea kakigori, shorter line than other branches. opens 10am ⭐ 4.3",maps:"https://maps.google.com/?q=After+You+Dessert+ICONSIAM+Bangkok"},
      ]},
    ]},
    {day:4,theme:"Tattoos & Recovery",activities:[
      {name:"Slow Morning + Street Food",note:"sleep in and start late!! wander out for street food breakfast whenever you're ready",nearby:[
        {name:"CY Coffee Artisan & Roastery",type:"food",distance:"2 min walk on Soi 10",note:"omg this is literally on your street!! tiny garden cafe with only 18 seats, real pork bacon and all day breakfast. go before it fills up. opens 8am (closed mon) ⭐ 4.5",maps:"https://maps.google.com/?q=CY+Coffee+Artisan+Sukhumvit+10"},
        {name:"Sugar Cream Vintage (Terminal 21)",type:"souvenir",distance:"5 min walk inside Terminal 21",note:"omg the japanese vintage dresses in here are so beautiful. kae the owner literally makes you feel like a superstar when you try things on ⭐ 4.9",maps:"https://maps.google.com/?q=Sugar+Cream+Vintage+Terminal+21+Bangkok"},
        {name:"Stay Studio Sukhumvit 39",type:"photo",distance:"15 min walk on Soi 39",note:"self photo studio with a free makeup area to retouch before you shoot. great slow morning activity before your tattoo. wed to sun 10am to 6pm ⭐ 5.0",maps:"https://maps.google.com/?q=Stay+Studio+Sukhumvit+39+Bangkok"},
      ]},
      {name:"Tattoo Day",note:"go get your tattoo!! souvenir of a lifetime for real",nearby:[
        {name:"California Ink Tattoo",type:"diy",distance:"5 min walk on Soi 4",note:"closest top rated studio to the hotel. walk-ins possible, english speaking artists. open 9am to 2am ⭐ 4.9",maps:"https://maps.google.com/?q=California+Ink+Tattoo+Bangkok+Soi+4"},
        {name:"All Day Tattoo Studio",type:"diy",distance:"10 min walk at Rain Hill Mall",note:"one of the best studios in bangkok. book ahead. 12pm to 8pm ⭐ 4.9",maps:"https://maps.google.com/?q=All+Day+Tattoo+Studio+Bangkok"},
      ]},
      {name:"Post-Tattoo Recovery",note:"post tattoo recovery mode. walk around, get drinks and dessert, get a massage or just hit the pool",nearby:[
        {name:"7SEVEN Spa",type:"spa",distance:"2 min walk on Soi 10",note:"on your street!! perfect post tattoo massage. open until 2am ⭐ 4.7",maps:"https://maps.google.com/?q=7Seven+Spa+Sukhumvit+10+Bangkok"},
        {name:"Eden The Ultimate Spa",type:"spa",distance:"10 min walk on Soi 11",note:"the full luxury treatment after getting tattooed and its 5.0 stars which says everything. opens 10am ⭐ 5.0",maps:"https://maps.google.com/?q=Eden+Spa+Sukhumvit+11+Bangkok"},
        {name:"Aromdee Pottery Studio",type:"diy",distance:"20 min BTS toward On Nut",note:"if you got tattooed in the morning, a chill pottery session in the afternoon is actually so therapeutic. book online, tue to sun 10am ⭐ 5.0",maps:"https://maps.google.com/?q=Aromdee+Art+Studio+Bangkok+Pottery"},
      ]},
    ]},
    {day:5,theme:"Last Bangkok Day then Vietnam",activities:[
      {name:"Morning Markets + River",note:"last look at bangkok! markets, street food, see the river before you have to go",nearby:[
        {name:"SW1 Market (Asoke)",type:"market",distance:"5 min walk from hotel",note:"last morning browse for any snacks or souvenirs you missed. opens 4pm so good for late afternoon before airport ⭐ 4.1",maps:"https://maps.google.com/?q=SW1+Market+Asoke+Bangkok"},
        {name:"Souvenirs Bangkok",type:"souvenir",distance:"7 min walk on Sukhumvit Rd",note:"best prices for thailand shirts and souvenirs in the area. stock up before flying out. opens 9am ⭐ 4.7",maps:"https://maps.google.com/?q=Souvenirs+Bangkok+Sukhumvit"},
        {name:"Terminal 21 Asok",type:"souvenir",distance:"5 min walk from hotel",note:"last minute gifts from the basement market before you head out. opens 10am ⭐ 4.6",maps:"https://maps.google.com/?q=Terminal+21+Asok+Bangkok"},
      ]},
      {name:"Fly to Vietnam (7:25PM)",note:"leave for the airport around 4pm and you land in ho chi minh city at 9:05pm!! vietnam era begins",nearby:[]},
    ]},
  ],
  hcmc:[
    {day:1,theme:"Saigon Square & Ben Thanh",activities:[
      {name:"Saigon Square",note:"vietnam's oldest market and you can get clothes tailored and made here for later pickup which is so cool",nearby:[
        {name:"Local Saigon Cafe Ben Thanh",type:"food",distance:"3 min walk on Thu Khoa Huan St",note:"first morning coffee sorted right here. the iced salted coffee is so good and the mugs are so cute. opens 7:30am ⭐ 4.7",maps:"https://maps.google.com/?q=Local+Saigon+Cafe+Ben+Thanh"},
        {name:"Tonkin Specialty Coffee",type:"food",distance:"5 min walk on Ly Tu Trong St",note:"the egg coffee and salted coffee are so good people literally come back every single morning. you will too. opens 8am ⭐ 4.8",maps:"https://maps.google.com/?q=Tonkin+Specialty+Coffee+Ho+Chi+Minh"},
        {name:"Saigon Eco Craft",type:"souvenir",distance:"5 min walk on Le Loi St",note:"high quality handmade ceramics right near saigon square. fixed prices so no stress bargaining. they gift wrap beautifully. opens 8am ⭐ 4.5",maps:"https://maps.google.com/?q=Saigon+Eco+Craft+Ho+Chi+Minh"},
        {name:"Photo Palette Photo Booth",type:"photo",distance:"5 min walk on Huynh Thuc Khang",note:"film style photo booth with cute templates and props. 100k dong for two sheets which is like nothing. opens 9:30am ⭐ 4.8",maps:"https://maps.google.com/?q=Photo+Palette+Ho+Chi+Minh"},
      ]},
      {name:"Ben Thanh Market (Evening)",note:"souvenir stalls, casual open air restaurants everywhere and the atmosphere at night is so lively",nearby:[
        {name:"Ben Nghe Street Food",type:"food",distance:"5 min walk on Nam Ky Khoi Nghia",note:"multi cuisine food court. vietnamese, thai, japanese, korean. opens 9am to 1am ⭐ 4.3",maps:"https://maps.google.com/?q=Ben+Nghe+Street+Food+Ho+Chi+Minh"},
        {name:"Mayhouse Craft Decor & Gifts",type:"souvenir",distance:"10 min walk on Mac Thi Buoi St",note:"the cutest gift shop. vietnamese playing cards, handmade pins. open 9am ⭐ 4.9",maps:"https://maps.google.com/?q=Mayhouse+Craft+Decor+Ho+Chi+Minh"},
        {name:"Nguyen Hue Walking Street (evening)",type:"photo",distance:"5 min walk",note:"comes alive at night. cafe apartment building all lit up, fountain plaza, golden lanterns. best photos after 7pm ⭐ 4.5",maps:"https://maps.google.com/?q=Nguyen+Hue+Walking+Street+Ho+Chi+Minh"},
        {name:"The Cafe Apartment (42 Nguyen Hue)",type:"viral",distance:"5 min walk on Nguyen Hue Walking Street",note:"literally one of the most viral spots in all of vietnam. each floor is a different cafe and the colorful balconies all face the street and every single influencer has this photo. go at sunset ⭐ 4.4",maps:"https://maps.google.com/?q=The+Cafe+Apartment+Ho+Chi+Minh"},
        {name:"Vo Roof",type:"nightlife",distance:"8 min walk on Ton That Dam St",note:"casual rooftop cocktails and vietnamese small plates and they give you a welcome shot of hibiscus tea. great first night spot. opens 10am ⭐ 4.6",maps:"https://maps.google.com/?q=Vo+Roof+Ho+Chi+Minh+City"},
      ]},
    ]},
    {day:2,theme:"Nguyen Hue Walking Street + Party Night",activities:[
      {name:"Nguyen Hue Walking Street",note:"cafes and restaurants all down this strip and the opera house and the famous cafe apartment building are right here",nearby:[
        {name:"The Cafe Apartment",type:"food",distance:"on the walking street you can't miss it",note:"entire apartment building of stacked cafes. walk floor to floor, each with its own vibe ⭐ 4.4",maps:"https://maps.google.com/?q=The+Cafe+Apartment+Ho+Chi+Minh"},
        {name:"Lacaph Coffee Bar",type:"food",distance:"5 min walk on Dong Khoi",note:"best coffee in district 1. pandan espresso, salted coffee, barber shop attached. opens 9am ⭐ 4.9",maps:"https://maps.google.com/?q=Lacaph+Coffee+Bar+Ho+Chi+Minh"},
        {name:"The Craft House Original",type:"souvenir",distance:"15 min walk on Nguyen Trai St",note:"upstairs shop with local souvenirs, handmade board games and cute lamps. so many good finds. opens 9:30am ⭐ 4.8",maps:"https://maps.google.com/?q=The+Craft+House+Original+Ho+Chi+Minh"},
        {name:"DIY HOUSE Workshop",type:"diy",distance:"20 min walk on Hai Ba Trung St",note:"candle making, pixel art, cup painting, knitting and a drink is included!! great afternoon activity before going out. opens 8am ⭐ 4.9",maps:"https://maps.google.com/?q=DIY+House+Workshop+Ho+Chi+Minh"},
      ]},
      {name:"Bui Vien Street Party Night",note:"saturday night out!! neon lights everywhere, bars, clubs, the whole bui vien strip is so alive",nearby:[
        {name:"Boosh Rooftop",type:"nightlife",distance:"on Bui Vien at number 6",note:"urban rooftop with a pool table, beer pong, foosball, arcade games. the best pre party spot. opens 6pm ⭐ 4.9",maps:"https://maps.google.com/?q=Boosh+Rooftop+Ho+Chi+Minh"},
        {name:"The View Rooftop Bar",type:"nightlife",distance:"9th floor, 195 Bui Vien",note:"9th floor rooftop with lanterns and the saigon skyline and such beautiful cocktails. opens 7am ⭐ 4.6",maps:"https://maps.google.com/?q=The+View+Rooftop+Bar+Bui+Vien"},
        {name:"Lost in Saigon Bar",type:"nightlife",distance:"60-62 Bui Vien",note:"live music every single night and some of the best cover bands on the whole street. opens 4pm ⭐ 4.0",maps:"https://maps.google.com/?q=Lost+in+Saigon+Bar+Bui+Vien"},
        {name:"Bui Vien Street at night",type:"photo",distance:"you're already here!",note:"at 9 or 10pm shoot from the middle of the street looking down the whole strip. the neon is insane ⭐ 4.5",maps:"https://maps.google.com/?q=Bui+Vien+Street+Ho+Chi+Minh"},
      ]},
    ]},
    {day:3,theme:"Heritage & Landmark 81",activities:[
      {name:"Saigon Central Post Office + Notre-Dame",note:"mail postcards home, admire the french colonial architecture. it's genuinely so beautiful in person",nearby:[
        {name:"Tonkin Specialty Coffee",type:"food",distance:"5 min walk on Ly Tu Trong",note:"morning coffee before the post office opens. a must every morning ⭐ 4.8",maps:"https://maps.google.com/?q=Tonkin+Specialty+Coffee+Ho+Chi+Minh"},
        {name:"Notre-Dame Cathedral",type:"photo",distance:"you're already here!",note:"french colonial architecture up close. best photo from the end of the courtyard at sunrise ⭐ 4.6",maps:"https://maps.google.com/?q=Notre+Dame+Cathedral+Ho+Chi+Minh"},
        {name:"Garden Art Baking Class",type:"diy",distance:"20 min drive off Le Van Sy",note:"book this for the afternoon after the post office morning. you leave with tarts you actually baked yourself which is so cute. opens 9:30am ⭐ 4.9",maps:"https://maps.google.com/?q=Garden+Art+Baking+Workshop+Ho+Chi+Minh"},
      ]},
      {name:"Landmark 81",note:"observation deck of vietnam's tallest building, there's also an ice rink, great dining and a riverfront walk",nearby:[
        {name:"Landmark 81 observation deck",type:"photo",distance:"you're already there!",note:"vietnam's tallest building and the view at sunset when the river goes gold is the money shot ⭐ 4.5",maps:"https://maps.google.com/?q=Landmark+81+Ho+Chi+Minh"},
      ]},
      {name:"Bui Vien & District 1 (Evening)",note:"back to bui vien for another night out because it never gets old",nearby:[
        {name:"Boosh Rooftop",type:"nightlife",distance:"on Bui Vien at number 6",note:"perfect pre party warm up spot. opens 6pm ⭐ 4.9",maps:"https://maps.google.com/?q=Boosh+Rooftop+Ho+Chi+Minh"},
        {name:"Lost in Saigon Bar",type:"nightlife",distance:"60-62 Bui Vien",note:"live music every night. opens 4pm ⭐ 4.0",maps:"https://maps.google.com/?q=Lost+in+Saigon+Bar+Bui+Vien"},
      ]},
    ]},
  ],
  hanoi:[
    {day:4,theme:"Arrive in Hanoi + Explore",activities:[
      {name:"Check In + Hoan Kiem Lake",note:"land at 12:35pm, check in and just decompress. wander around the lake and pop into cafes as you go",nearby:[
        {name:"Hidden Gem Cafe",type:"food",distance:"5 min walk on Hang Mam St",note:"an entire upcycled art installation thats also a cafe. egg coffee, banh mi. so local and so good. opens 7am ⭐ 4.8",maps:"https://maps.google.com/?q=Hidden+Gem+Cafe+Hanoi+Old+Quarter"},
        {name:"Bancong Cafe",type:"food",distance:"5 min walk on Dinh Liet St",note:"balcony cafe overlooking the old quarter with bun cha and lychee tea. opens 8am ⭐ 4.8",maps:"https://maps.google.com/?q=Bancong+Cafe+Hanoi"},
        {name:"Hoan Kiem Lake at sunset",type:"photo",distance:"5 min walk from hotel",note:"walk the whole perimeter and shoot the red huc bridge and turtle tower at golden hour. absolutely stunning ⭐ 4.5",maps:"https://maps.google.com/?q=Hoan+Kiem+Lake+Hanoi"},
        {name:"Chu Choah Local Art & Gifts",type:"souvenir",distance:"10 min walk on Ngo Hoi Vu St",note:"all local vietnamese artists and everything is so unique. the perfume balm and bags are so good. opens 9am ⭐ 5.0",maps:"https://maps.google.com/?q=Chu+Choah+Hanoi+Local+Art"},
        {name:"The Note Coffee",type:"viral",distance:"5 min walk on Luong Van Can St",note:"every single surface covered in handwritten notes from travelers all over the world. so viral on instagram and you get to write your own. opens 8am ⭐ 4.3",maps:"https://maps.google.com/?q=The+Note+Coffee+Hanoi"},
        {name:"Hidden Alley Cafe",type:"viral",distance:"5 min walk on Bao Khanh St",note:"tucked in a literal hidden alley then up a spiral staircase to an open rooftop and the walls are covered in colorful post it notes. so popular on hanoi tiktok right now. opens 8am ⭐ 4.7",maps:"https://maps.google.com/?q=Hidden+Alley+Cafe+Hanoi+Bao+Khanh"},
      ]},
      {name:"Old Quarter Night Market",note:"artisans and tailors and street food everywhere and the whole old quarter has such a good small business energy",nearby:[
        {name:"Hanoi Weekend Night Market",type:"market",distance:"2 min walk starts at Hang Dao St",note:"fri to sun 6pm to 11pm. clothes, souvenirs, food stalls. cash only. bargain everything ⭐ 4.3",maps:"https://maps.google.com/?q=Hanoi+Weekend+Night+Market"},
        {name:"Old Quarter at night",type:"photo",distance:"right outside your hotel",note:"the old quarter at night is electric. lanterns, neon, motorbike chaos. hang gai and hang bac streets are especially photogenic after dark ⭐ 4.6",maps:"https://maps.google.com/?q=Hanoi+Old+Quarter+Night"},
        {name:"Hanoi House Cocktail Bar",type:"nightlife",distance:"5 min walk on Ly Quoc Su",note:"vietnamese inspired cocktails on a balcony overlooking the cathedral and happy hour is a thing here. opens 10am ⭐ 4.6",maps:"https://maps.google.com/?q=Hanoi+House+Cocktail+Bar"},
      ]},
    ]},
    {day:5,theme:"Cathedral, Book Street & Train Street",activities:[
      {name:"St Joseph Cathedral",note:"open daily and the tree lined streets around it are perfect for wandering and getting photos",nearby:[
        {name:"The Running Bean",type:"food",distance:"2 min walk on Nha Tho St",note:"literally right next to the cathedral!! get the coconut cloud matcha and the wild mushroom fettucine is so good. opens 8am ⭐ 4.8",maps:"https://maps.google.com/?q=The+Running+Bean+Hanoi+Nha+Tho"},
        {name:"Dreamers & Seekers",type:"food",distance:"3 min walk near the Cathedral",note:"egg coffee, chilli scrambled eggs and genuinely the best burger in hanoi. opens 8:30am ⭐ 4.8",maps:"https://maps.google.com/?q=Dreamers+Seekers+Hanoi"},
        {name:"St Joseph Cathedral courtyard",type:"photo",distance:"you're already here!",note:"french gothic cathedral surrounded by tree lined streets. one of the most photographed spots in hanoi especially at night ⭐ 4.7",maps:"https://maps.google.com/?q=St+Joseph+Cathedral+Hanoi"},
        {name:"An Handmade Hemp Fabric Gifts",type:"souvenir",distance:"5 min walk on Ly Quoc Su St",note:"handmade bags from northern vietnamese ethnic minority communities. buying here actually supports them directly. opens 9am ⭐ 4.9",maps:"https://maps.google.com/?q=An+Handmade+Hemp+Hanoi+Ly+Quoc+Su"},
        {name:"The Note Coffee",type:"viral",distance:"7 min walk on Luong Van Can St",note:"while you're near the cathedral just swing by. every surface covered in travelers notes and you get to leave yours too. opens 8am ⭐ 4.3",maps:"https://maps.google.com/?q=The+Note+Coffee+Hanoi"},
      ]},
      {name:"Hanoi Book Street",note:"glass fronted bookstores, cozy reading corners, open air cafes everywhere. and obama ate here which is kind of iconic",nearby:[
        {name:"Xoi Banh Mi Kim Huong",type:"food",distance:"5 min walk on Bao Khanh St",note:"the best banh mi in hanoi and people genuinely come back 3 times in one trip. opens 7am ⭐ 5.0",maps:"https://maps.google.com/?q=Xoi+Banh+Mi+Kim+Huong+Hanoi"},
        {name:"Ames Studio Handcrafted Souvenirs",type:"souvenir",distance:"7 min walk on Hang Dieu St",note:"the ceramics in here are so stunning and the colors are gorgeous. you genuinely will not find anything like this anywhere else. opens 9am ⭐ 5.0",maps:"https://maps.google.com/?q=Ames+Studio+Hanoi+Hang+Dieu"},
      ]},
      {name:"Cafe Train Street (Evening)",note:"make a reservation!! a real train drives literally inches from the cafe tables. sit with your back to the wall and do not get hit lol",nearby:[
        {name:"Train Street cafes",type:"viral",distance:"you're already here!",note:"the viral train photo of vietnam. sit with your back to the wall, make a reservation and get the shot. arrive 30 min before scheduled train time ⭐ 4.5",maps:"https://maps.google.com/?q=Train+Street+Hanoi"},
        {name:"Bancong Cafe",type:"food",distance:"10 min walk back toward Old Quarter",note:"perfect place to wind down after train street. balcony drinks until 11pm ⭐ 4.8",maps:"https://maps.google.com/?q=Bancong+Cafe+Hanoi"},
      ]},
    ]},
    {day:6,theme:"Ninh Binh Day Trip + Fine Dining",activities:[
      {name:"Ninh Binh Day Trip (7AM pickup)",note:"full tour with everything included, lunch, guide, row boats, caves, temples. literally just show up",nearby:[
        {name:"Hidden Gem Cafe",type:"food",distance:"5 min walk, grab coffee before pickup",note:"quick coffee before the 7am pickup. it opens right on time ⭐ 4.8",maps:"https://maps.google.com/?q=Hidden+Gem+Cafe+Hanoi+Old+Quarter"},
      ]},
      {name:"Trang An & Hang Mua",note:"row boats through the landscape, biking, caves and temples. drop off is 7 to 7:15pm",nearby:[
        {name:"Hang Mua viewpoint",type:"photo",distance:"at the tour site, climb the stairs!",note:"485 steps to the top and the view of all of trang an laid out below is one of the best in all of vietnam. every single step is worth it ⭐ 4.8",maps:"https://maps.google.com/?q=Hang+Mua+Ninh+Binh"},
      ]},
      {name:"T.U.N.G Dining (8:30PM Reservation)",note:"one of hanoi's most well known fine dining spots doing modern vietnamese tasting menus. do not be late for this one",nearby:[
        {name:"Hanoi House Cocktail Bar",type:"nightlife",distance:"near Old Quarter, pre-dinner drinks",note:"get here at 7:30pm after the tour drop off for cocktails before your 8:30pm dinner reservation ⭐ 4.6",maps:"https://maps.google.com/?q=Hanoi+House+Cocktail+Bar"},

    {day:7,theme:"Last Day in Hanoi then Home",activities:[
      {name:"Last Morning in Hanoi",note:"last morning in hanoi!! do everything you haven't done yet, you need to leave for the airport by 3pm",nearby:[
        {name:"Xoi Banh Mi Kim Huong",type:"food",distance:"5 min walk on Bao Khanh St",note:"one last banh mi before you fly home. you will be so sad to leave. opens 7am ⭐ 5.0",maps:"https://maps.google.com/?q=Xoi+Banh+Mi+Kim+Huong+Hanoi"},
        {name:"The Running Bean",type:"food",distance:"10 min walk near St Joseph Cathedral",note:"one last coconut cloud matcha for the road. opens 8am ⭐ 4.8",maps:"https://maps.google.com/?q=The+Running+Bean+Hanoi+Nha+Tho"},
        {name:"Hoan Kiem Lake at dawn",type:"photo",distance:"5 min walk from hotel",note:"hoan kiem lake at dawn with almost no one around. one of the most peaceful photos you will take on this whole trip ⭐ 4.5",maps:"https://maps.google.com/?q=Hoan+Kiem+Lake+Hanoi"},

let S={city:'bangkok',tab:'hotel',filter:'all',openDay:0,openAct:null};
function ss(u){Object.assign(S,u);R()}
function sc(s){
  const tc=TC[s.type]||TC.food;
  return '<div class="sc" style="background:'+tc.bg+';border-left-color:'+tc.color+'">'+
    '<div class="si"><div class="sn">'+s.name+'</div>'+
    '<div class="st" style="color:'+tc.color+'">'+tc.label+' &#183; &#128205; '+s.distance+'</div>'+
    '<div class="sm">'+s.note+'</div></div>'+
    '<a href="'+s.maps+'" target="_blank" class="mb" style="background:'+tc.color+'">Map &#8594;</a></div>';
}
function R(){
  const H=HOTELS[S.city],D=DAYS[S.city];
  const aT=[...new Set(H.spots.map(s=>s.type))];
  const fil=S.filter==='all'?H.spots:H.spots.filter(s=>s.type===S.filter);
  const cn={bangkok:'&#127481;&#127469; Bangkok',hcmc:'&#127483;&#127475; Ho Chi Minh',hanoi:'&#127483;&#127475; Hanoi'};
  let h='<div class="hdr"><div class="eye">July 2025</div>'+
    '<h1>Thailand & Vietnam &#127481;&#127469;&#127483;&#127475;</h1>'+
    '<p class="sub">food, spas, photo spots, viral spots and everything in between</p>'+
    '<div class="ctabs">';
  for(const[k,v] of Object.entries(cn))
    h+='<button class="ctab'+(S.city===k?' on':'')+'" onclick="ss({city:\''+k+'\',tab:\'hotel\',filter:\'all\',openDay:0,openAct:null})">'+v+'</button>';
  h+='</div></div><div class="wrap">';
  h+='<div class="hban"><div class="hlbl">your hotel</div><div class="hname">'+H.name+'</div><div class="hnote">'+H.note+'</div></div>';
  h+='<div class="ttog">'+
    '<button class="tbtn'+(S.tab==='hotel'?' on':'')+'" onclick="ss({tab:\'hotel\'})">&#127968; near hotel</button>'+
    '<button class="tbtn'+(S.tab==='days'?' on':'')+'" onclick="ss({tab:\'days\'})">&#128197; by activity</button>'+
    '</div>';
  if(S.tab==='hotel'){
    h+='<p class="slbl">everything walkable from <strong>'+H.name+'</strong></p><div class="pills">';
    h+='<button class="pill" style="'+(S.filter==='all'?'background:#2D1F4E;color:white;border-color:#2D1F4E':'')+'" onclick="ss({filter:\'all\'})">All</button>';
    for(const t of aT){
      const tc=TC[t]||TC.food,on=S.filter===t;
      h+='<button class="pill" style="'+(on?'background:'+tc.bg+';color:'+tc.color+';border-color:'+tc.color:'')+'" onclick="ss({filter:S.filter===\''+t+'\'?\'all\':'+JSON.stringify(t)+'  })">'+tc.label+'</button>';
    }
    h+='</div>'+fil.map(s=>sc(s)).join('');
  } else {
    for(let di=0;di<D.length;di++){
      const d=D[di],isO=S.openDay===di,tot=d.activities.reduce((a,x)=>a+x.nearby.length,0);
      let inn='';
      if(isO){
        inn='<div class="dbody">';
        for(let ai=0;ai<d.activities.length;ai++){
          const a=d.activities[ai],k=di+'-'+ai,isA=S.openAct===k,has=a.nearby.length>0;
          inn+='<div class="ab'+(has?' ac':'')+'" onclick="'+(has?'ss({openAct:S.openAct===\''+k+'\'?null:\''+k+'\'})'         :'')+'">';
          inn+='<div style="flex:1"><div class="an">&#128205; '+a.name+'</div><div class="anote">'+a.note+'</div></div>';
          if(has) inn+='<div class="acnt">'+a.nearby.length+' nearby '+(isA?'&#9650;':'&#9660;')+'</div>';
          inn+='</div>';
          if(isA) inn+=a.nearby.map(s=>'<div class="ni">'+sc(s)+'</div>').join('');
        }
        inn+='</div>';
      }
      h+='<div class="dc"><button class="dh" onclick="ss({openDay:S.openDay==='+di+'?null:'+di+',openAct:null})">'+
        '<div style="flex:1"><div><span class="db">DAY '+d.day+'</span><span class="dt">'+d.theme+'</span></div>'+
        '<div class="dcn">'+tot+' spots nearby</div></div>'+
        '<span style="font-size:16px;color:#ccc;margin-left:8px">'+(isO?'&#9650;':'&#9660;')+'</span></button>'+inn+'</div>';
    }
  }
  h+='</div><div class="ftr">tap near hotel for everything walkable from your room &#183; tap by activity to see what's right next to each thing you're doing</div>';
  document.getElementById('app').innerHTML=h;
}
R();
if('serviceWorker' in navigator){
  const sw=`const C='tv-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
  const b=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}
</script>
